<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kuduwa Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #020208; color: white; padding: 2rem; }
    .hidden { display: none; }
    .panel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .panel-card { background: #1a1a24; padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid #333; }
    .panel-img { width: 100%; height: 120px; object-fit: cover; background: #000; margin-bottom: 1rem; border-radius: 4px; }
    input[type="file"] { width: 100%; margin-bottom: 0.5rem; color: #fff; }
    button { background: #0088ff; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; font-family: inherit; font-weight: 600; }
    button:hover { background: #0066cc; }
    h2 { margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
    #login-screen { max-width: 400px; margin: 100px auto; text-align: center; background: #1a1a24; padding: 2rem; border-radius: 8px; border: 1px solid #333; }
    #password { padding: 0.75rem; width: 80%; margin-bottom: 1rem; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff; }
  </style>
</head>
<body>
  <div id="login-screen">
    <h2>Secret Kuduwa Login</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button id="btn-login">Login</button>
  </div>

  <div id="dashboard" class="hidden">
    <h1>Manage Kuduwa Panels</h1>
    <p style="margin-bottom: 2rem; color: #aaa;">Upload images to display on the 8 Upper and 8 Lower panels of the rotating Kuduwa.</p>
    
    <h2>Upper Panels</h2>
    <div class="panel-grid" id="grid-upper"></div>
    
    <h2>Lower Panels</h2>
    <div class="panel-grid" id="grid-lower"></div>
  </div>

  <script type="module" src="/dashboard.js"></script>
</body>
</html>
